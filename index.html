  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;compact-damage-calculator&quot;&gt;
  &lt;style&gt;
    #compact-damage-calculator {
      display: grid;
      gap: 12px;
      color: var(--foreground);
      min-width: 0;
      max-width: 100%;
      --cdc-section-border: color-mix(in oklab, var(--foreground) 16%, transparent);
      --cdc-section-bg: color-mix(in oklab, var(--foreground) 3.5%, transparent);
      --cdc-heading-bg: color-mix(in oklab, var(--foreground) 6.5%, transparent);
      --cdc-accent-bg: color-mix(in oklab, var(--primary) 8%, transparent);
    }
    #compact-damage-calculator [hidden] { display: none !important; }
    #compact-damage-calculator .compact-fields {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
      gap: 8px 12px;
    }
    #compact-damage-calculator .result-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 8px;
    }
    #compact-damage-calculator details {
      overflow: clip;
      border: 1px solid var(--cdc-section-border);
      border-radius: 10px;
      background: var(--cdc-section-bg);
      padding: 0 10px 10px;
    }
    #compact-damage-calculator summary {
      cursor: pointer;
      font-weight: 600;
      margin: 0 -10px 10px;
      padding: 8px 10px;
      background: var(--cdc-heading-bg);
      border-left: 3px solid var(--primary);
      border-bottom: 1px solid var(--cdc-section-border);
    }
    #compact-damage-calculator details:not([open]) { padding-bottom: 0; }
    #compact-damage-calculator details:not([open]) &gt; summary { margin-bottom: 0; border-bottom: 0; }
    #compact-damage-calculator summary::marker { color: var(--primary); }
    #compact-damage-calculator .section-label {
      font-weight: 600;
      margin: 10px 0 8px;
      padding-left: 8px;
      border-left: 3px solid var(--primary);
    }
    #compact-damage-calculator .profile-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px 12px;
      align-items: end;
      min-width: 0;
      margin-top: 8px;
      padding: 10px;
      border: 1px solid var(--cdc-section-border);
      border-radius: 10px;
      background: var(--cdc-section-bg);
      box-shadow: inset 3px 0 0 var(--primary);
    }
    #compact-damage-calculator .profile-fields {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) minmax(110px, .65fr) minmax(190px, 1.25fr);
      gap: 8px;
      align-items: end;
      min-width: 0;
    }
    #compact-damage-calculator .profile-actions {
      display: grid;
      grid-template-columns: repeat(4, max-content);
      gap: 6px;
      align-items: end;
    }
    #compact-damage-calculator .profile-actions .btn,
    #compact-damage-calculator .mode-row .btn,
    #compact-damage-calculator #cdc-run-verification { min-height: 34px; white-space: nowrap; }
    #compact-damage-calculator .profile-status { grid-column: 1 / -1; min-height: 1.25em; }
    #compact-damage-calculator .pagination-bar {
      display: grid;
      gap: 8px;
      min-width: 0;
    }
    #compact-damage-calculator .pagination-bar { grid-template-columns: repeat(4, auto); justify-content: start; align-items: center; }
    #compact-damage-calculator .mode-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      width: 100%;
    }
    #compact-damage-calculator .toolbar-label {
      min-height: 1.25em;
      margin-bottom: 4px;
      color: var(--muted-foreground);
      font-size: .875em;
      line-height: 1.25;
    }
    #compact-damage-calculator .calculator-mode-field {
      box-sizing: border-box;
      width: min(520px, 100%);
      padding: 0 10px;
    }
    #compact-damage-calculator .verification-toolbar {
      display: grid;
      grid-template-columns: minmax(240px, .85fr) minmax(300px, 1.35fr) max-content minmax(170px, .7fr);
      gap: 8px 12px;
      align-items: end;
      min-width: 0;
    }
    #compact-damage-calculator .verification-toolbar &gt; * { min-width: 0; }
    #compact-damage-calculator .verification-toolbar #cdc-run-status {
      align-self: end;
      min-height: 34px;
      display: flex;
      align-items: center;
    }
    #compact-damage-calculator .numeric,
    #compact-damage-calculator .result-main { font-variant-numeric: tabular-nums; }
    #compact-damage-calculator .result-meta,
    #compact-damage-calculator .verification-note { color: var(--muted-foreground); }
    #compact-damage-calculator .entry-list { display: grid; gap: 10px; min-width: 0; }
    #compact-damage-calculator .entry-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(138px, 100%), 1fr));
      gap: 8px 12px;
      align-items: end;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      min-width: 0;
    }
    #compact-damage-calculator .entry-row &gt; * { min-width: 0; }
    #compact-damage-calculator .entry-row input,
    #compact-damage-calculator .entry-row select { max-width: 100%; }
    #compact-damage-calculator .detail-value { font-variant-numeric: tabular-nums; overflow-wrap: anywhere; }
    #compact-damage-calculator .main-workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      min-width: 0;
    }
    #compact-damage-calculator .skills-workspace,
    #compact-damage-calculator .results-workspace {
      display: grid;
      gap: 12px;
      min-width: 0;
    }
    #compact-damage-calculator .results-workspace {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: start;
    }
    #compact-damage-calculator .verification-panel {
      display: grid;
      gap: 10px;
      padding: 10px;
      border: 1px solid color-mix(in oklab, var(--primary) 32%, var(--cdc-section-border));
      border-radius: 10px;
      background: var(--cdc-accent-bg);
    }
    #compact-damage-calculator .result-row &gt; .card {
      border: 1px solid var(--cdc-section-border);
      border-radius: 10px;
      box-shadow: inset 3px 0 0 color-mix(in oklab, var(--primary) 72%, var(--foreground));
    }
    #compact-damage-calculator .result-panel {
      min-width: 0;
      padding: 0 10px 10px;
      border: 1px solid var(--cdc-section-border);
      border-radius: 10px;
      background: var(--cdc-section-bg);
    }
    #compact-damage-calculator .result-panel &gt; .section-label {
      margin: 0 -10px 10px;
      padding: 8px 10px;
      background: var(--cdc-heading-bg);
      border-left: 3px solid var(--primary);
      border-bottom: 1px solid var(--cdc-section-border);
      border-radius: 9px 9px 0 0;
    }
    #compact-damage-calculator #cdc-ocr-dialog {
      width: min(1120px, calc(100vw - 40px));
      max-width: none;
      max-height: calc(100vh - 40px);
      color: var(--popover-foreground);
      background: var(--popover);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    #compact-damage-calculator #cdc-ocr-dialog::backdrop { background: color-mix(in oklab, var(--background) 65%, transparent); }
    #compact-damage-calculator .ocr-header,
    #compact-damage-calculator .ocr-capture-bar,
    #compact-damage-calculator .ocr-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: end;
      justify-content: space-between;
    }
    #compact-damage-calculator .ocr-capture-bar { justify-content: flex-start; margin: 12px 0; }
    #compact-damage-calculator .ocr-capture-bar .form-label { min-width: 170px; }
    #compact-damage-calculator .ocr-preview {
      display: grid;
      grid-template-columns: minmax(180px, .45fr) minmax(0, 1.55fr);
      gap: 12px;
      align-items: start;
      margin: 12px 0;
    }
    #compact-damage-calculator .ocr-preview img { display: block; width: 100%; height: auto; }
    #compact-damage-calculator .ocr-table-wrap { max-height: 42vh; overflow: auto; }
    #compact-damage-calculator .ocr-footer { margin-top: 12px; }
    @media (max-width: 520px) {
      #compact-damage-calculator .result-row { grid-template-columns: 1fr; }
      #compact-damage-calculator .ocr-preview { grid-template-columns: 1fr; }
    }
    @media (max-width: 1099px) {
      #compact-damage-calculator .main-workspace,
      #compact-damage-calculator .results-workspace { grid-template-columns: 1fr; }
      #compact-damage-calculator .profile-bar { grid-template-columns: 1fr; }
      #compact-damage-calculator .profile-actions { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      #compact-damage-calculator .verification-toolbar {
        grid-template-columns: minmax(220px, .85fr) minmax(260px, 1.25fr) max-content;
      }
      #compact-damage-calculator .verification-toolbar #cdc-run-status { grid-column: 1 / -1; min-height: 1.25em; }
    }
    @media (max-width: 760px) {
      #compact-damage-calculator .profile-fields,
      #compact-damage-calculator .verification-toolbar { grid-template-columns: 1fr; }
      #compact-damage-calculator .profile-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      #compact-damage-calculator .profile-actions .btn,
      #compact-damage-calculator #cdc-run-verification { width: 100%; }
      #compact-damage-calculator .verification-toolbar #cdc-run-status {
        grid-column: auto;
        min-height: 1.25em;
      }
    }
    @media (min-width: 1100px) {
      #compact-damage-calculator .main-workspace { grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr); }
      #compact-damage-calculator #cdc-panel-section .compact-fields,
      #compact-damage-calculator #cdc-effect-section .compact-fields { grid-template-columns: repeat(6, minmax(0, 1fr)); }
      #compact-damage-calculator #cdc-effects .entry-row {
        grid-template-columns: 1.2fr repeat(6, minmax(50px, .65fr)) minmax(70px, .8fr) minmax(50px, .65fr) auto;
        gap: 6px;
      }
      #compact-damage-calculator #cdc-skills .entry-row {
        grid-template-columns: 1.15fr minmax(82px, .9fr) minmax(56px, .7fr) minmax(72px, .85fr) auto auto auto;
        gap: 6px;
      }
      #compact-damage-calculator #cdc-heals .entry-row {
        grid-template-columns: 1.2fr minmax(60px, .75fr) minmax(78px, .9fr) auto auto;
        gap: 6px;
      }
      #compact-damage-calculator #cdc-best-details .entry-row {
        grid-template-columns: 1fr 1.2fr 1.4fr .7fr .5fr;
        gap: 6px;
      }
      #compact-damage-calculator #cdc-combination-results .entry-row {
        grid-template-columns: 1.5fr .8fr .8fr;
        gap: 6px;
      }
    }
  &lt;/style&gt;

  &lt;div class=&quot;profile-bar&quot;&gt;
    &lt;div class=&quot;profile-fields&quot;&gt;
      &lt;label class=&quot;form-label&quot;&gt;角色名称
        &lt;input class=&quot;form-control&quot; id=&quot;cdc-character&quot; type=&quot;text&quot; value=&quot;测试角色&quot;&gt;
      &lt;/label&gt;
      &lt;label class=&quot;form-label&quot;&gt;版本
        &lt;input class=&quot;form-control&quot; id=&quot;cdc-version&quot; type=&quot;text&quot; value=&quot;1.0&quot;&gt;
      &lt;/label&gt;
      &lt;label class=&quot;form-label&quot;&gt;已保存配置
        &lt;select class=&quot;form-select&quot; id=&quot;cdc-profile-select&quot;&gt;&lt;/select&gt;
      &lt;/label&gt;
    &lt;/div&gt;
    &lt;div class=&quot;profile-actions&quot;&gt;
      &lt;button class=&quot;btn btn-primary&quot; id=&quot;cdc-save-profile&quot; type=&quot;button&quot;&gt;保存/覆盖&lt;/button&gt;
      &lt;button class=&quot;btn&quot; id=&quot;cdc-load-profile&quot; type=&quot;button&quot;&gt;载入&lt;/button&gt;
      &lt;button class=&quot;btn btn-ghost&quot; id=&quot;cdc-delete-profile&quot; type=&quot;button&quot;&gt;删除&lt;/button&gt;
      &lt;button class=&quot;btn btn-ghost&quot; id=&quot;cdc-clear-current&quot; type=&quot;button&quot;&gt;清空当前&lt;/button&gt;
    &lt;/div&gt;
    &lt;div class=&quot;profile-status text-small result-meta&quot; id=&quot;cdc-profile-status&quot; aria-live=&quot;polite&quot;&gt;自动记忆当前草稿&lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;calculator-mode-field&quot;&gt;
    &lt;div class=&quot;toolbar-label&quot;&gt;计算类型&lt;/div&gt;
    &lt;div class=&quot;mode-row&quot; role=&quot;group&quot; aria-label=&quot;计算类型&quot;&gt;
      &lt;button class=&quot;btn btn-primary&quot; type=&quot;button&quot; data-calculator-type=&quot;damage&quot; aria-pressed=&quot;true&quot;&gt;伤害计算&lt;/button&gt;
      &lt;button class=&quot;btn&quot; type=&quot;button&quot; data-calculator-type=&quot;heal&quot; aria-pressed=&quot;false&quot;&gt;治疗计算&lt;/button&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;details open id=&quot;cdc-panel-section&quot;&gt;
    &lt;summary&gt;角色与目标面板&lt;/summary&gt;
    &lt;div class=&quot;compact-fields&quot;&gt;
      &lt;label class=&quot;form-label&quot;&gt;非战斗面板攻击

      &lt;/label&gt;
      &lt;label class=&quot;form-label&quot;&gt;基础战斗攻击加成（%）
        &lt;input class=&quot;form-control&quot; id=&quot;cdc-atk-bonus&quot; type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;20&quot;&gt;
      &lt;/label&gt;
      &lt;label class=&quot;form-label&quot; data-heal-only hidden&gt;基础治疗加成（%）

      &lt;/label&gt;

      &lt;label class=&quot;form-label&quot; data-fusion-field hidden&gt;基础环合强度
        &lt;input class=&quot;form-control&quot; id=&quot;cdc-fusion&quot; type=&quot;number&quot; min=&quot;0&quot; max=&quot;360&quot; step=&quot;0.01&quot; value=&quot;360&quot;&gt;

    &lt;/div&gt;
    &lt;div class=&quot;section-label&quot; data-damage-only&gt;基础伤害乘区&lt;/div&gt;
    &lt;div class=&quot;compact-fields&quot; data-damage-only&gt;
      &lt;label class=&quot;form-label&quot;&gt;基础防御穿透（%）
        &lt;input class=&quot;form-control&quot; id=&quot;cdc-penetration&quot; type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;15&quot;&gt;
      &lt;/label&gt;
      &lt;label class=&quot;form-label&quot;&gt;基础抗性削弱（%）
        &lt;input class=&quot;form-control&quot; id=&quot;cdc-res-shred&quot; type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;10&quot;&gt;
      &lt;/label&gt;
      &lt;label class=&quot;form-label&quot;&gt;通用增伤（%）
        &lt;input class=&quot;form-control&quot; id=&quot;cdc-general&quot; type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;30&quot;&gt;
      &lt;/label&gt;
      &lt;label class=&quot;form-label&quot;&gt;属性增伤（%）
        &lt;input class=&quot;form-control&quot; id=&quot;cdc-elemental&quot; type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;20&quot;&gt;
      &lt;/label&gt;
      &lt;label class=&quot;form-label&quot;&gt;额外增伤（%）
        &lt;input class=&quot;form-control&quot; id=&quot;cdc-extra&quot; type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;10&quot;&gt;
      &lt;/label&gt;
      &lt;label class=&quot;form-label&quot;&gt;面板暴击伤害（%）
        &lt;input class=&quot;form-control&quot; id=&quot;cdc-crit&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.01&quot; value=&quot;150&quot; title=&quot;填写游戏面板显示值；例如 134 表示实际暴击倍率为 1 + 134% = 2.34&quot;&gt;
      &lt;/label&gt;
    &lt;/div&gt;
    &lt;div class=&quot;viz-controls&quot; id=&quot;cdc-ocr-entry&quot; hidden&gt;
      &lt;button class=&quot;btn&quot; id=&quot;cdc-open-ocr&quot; type=&quot;button&quot;&gt;自动读取游戏面板&lt;/button&gt;
      &lt;span class=&quot;text-small result-meta&quot;&gt;桌面版功能：自动截取游戏窗口并在本机识别&lt;/span&gt;
    &lt;/div&gt;
  &lt;/details&gt;

  &lt;dialog id=&quot;cdc-ocr-dialog&quot;&gt;
    &lt;div class=&quot;ocr-header&quot;&gt;
      &lt;div&gt;
        &lt;div class=&quot;section-label&quot;&gt;截图识别基础面板&lt;/div&gt;
        &lt;div class=&quot;text-small result-meta&quot;&gt;程序会在倒计时期间隐藏并切回游戏；可趁倒计时打开详情或滚动面板。&lt;/div&gt;
      &lt;/div&gt;
      &lt;button class=&quot;btn btn-ghost&quot; id=&quot;cdc-close-ocr&quot; type=&quot;button&quot;&gt;关闭&lt;/button&gt;
    &lt;/div&gt;
    &lt;div class=&quot;ocr-capture-bar&quot;&gt;
      &lt;label class=&quot;form-label&quot;&gt;游戏窗口
        &lt;select class=&quot;form-select&quot; id=&quot;cdc-ocr-window&quot;&gt;&lt;/select&gt;
      &lt;/label&gt;
      &lt;button class=&quot;btn btn-ghost&quot; id=&quot;cdc-refresh-windows&quot; type=&quot;button&quot;&gt;刷新窗口&lt;/button&gt;

      &lt;div class=&quot;verification-note text-small&quot; id=&quot;cdc-verification-note&quot; aria-live=&quot;polite&quot;&gt;同一个候选状态会同时用于本次全部实测值；每条伤害或治疗的具体来源见左侧逐项验算。&lt;/div&gt;
      &lt;div class=&quot;entry-list&quot; id=&quot;cdc-combination-results&quot;&gt;&lt;/div&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;compact-damage-calculator&#x27;);
      const byId = (id) =&gt; root.querySelector(&#x27;#&#x27; + id);
      const number = (id) =&gt; Number(byId(id).value) || 0;
      const percent = (id) =&gt; number(id) / 100;
      const format = (value) =&gt; Number.isFinite(value)
        ? value.toLocaleString(&#x27;zh-CN&#x27;, { maximumFractionDigits: 6 })
        : &#x27;—&#x27;;
      const escapeHtml = (value) =&gt; String(value).replace(/[&amp;&lt;&gt;&quot;&#x27;]/g, (character) =&gt; ({
        &#x27;&amp;&#x27;: &#x27;&amp;amp;&#x27;, &#x27;&lt;&#x27;: &#x27;&amp;lt;&#x27;, &#x27;&gt;&#x27;: &#x27;&amp;gt;&#x27;, &#x27;&quot;&#x27;: &#x27;&amp;quot;&#x27;, &quot;&#x27;&quot;: &#x27;&amp;#39;&#x27;
      })[character]);
      let rowCounter = 0;
      let calculatorType = &#x27;damage&#x27;;
      let verificationMode = &#x27;normal&#x27;;
      let skillPage = 0;
      let detailPage = 0;
      let detailRows = [];
      let draftTimer = null;
      let restoring = false;
      let verificationDirty = false;
      const SKILL_PAGE_SIZE = 3;
      const DETAIL_PAGE_SIZE = 3;
      const REPORT_ERROR_LIMIT = 20;
      const SEARCH_PRESETS = {
        standard: { label: &#x27;标准&#x27;, exactLimit: 18, beamWidth: 5000 },
        deep: { label: &#x27;深度&#x27;, exactLimit: 20, beamWidth: 20000 },
        extreme: { label: &#x27;极限&#x27;, exactLimit: 22, beamWidth: 50000 }
      };
      const EXACT_RESULT_KEEP = 300;
      const PROFILE_STORAGE_KEY = &#x27;game-calculator-profiles-v1&#x27;;
      const DRAFT_STORAGE_KEY = &#x27;game-calculator-draft-v1&#x27;;
      const OCR_TARGETS = {
        panel_attack: { label: &#x27;非战斗面板攻击&#x27;, input: &#x27;cdc-panel&#x27; },
        base_attack: { label: &#x27;基础攻击&#x27;, input: &#x27;cdc-base&#x27; },
        character_level: { label: &#x27;角色等级&#x27;, input: &#x27;cdc-char-level&#x27; },
        crit_damage: { label: &#x27;面板暴击伤害&#x27;, input: &#x27;cdc-crit&#x27;, suffix: &#x27;%&#x27; },
        general_bonus: { label: &#x27;通用增伤&#x27;, input: &#x27;cdc-general&#x27;, suffix: &#x27;%&#x27; },
        elemental_bonus: { label: &#x27;属性增伤&#x27;, input: &#x27;cdc-elemental&#x27;, suffix: &#x27;%&#x27; },
        fusion_strength: { label: &#x27;基础环合强度&#x27;, input: &#x27;cdc-fusion&#x27; },
        healing_bonus: { label: &#x27;基础治疗加成&#x27;, input: &#x27;cdc-heal-bonus&#x27;, suffix: &#x27;%&#x27; }
      };
      const OCR_ORDER = Object.keys(OCR_TARGETS);
      const desktopRequests = new Map();
      let desktopRequestId = 0;
      let desktopApiAvailable = false;
      let ocrCaptures = [];
      let ocrMergedRows = [];

      function enableDesktopOcr() {
        desktopApiAvailable = true;
        byId(&#x27;cdc-ocr-entry&#x27;).hidden = false;
      }

      function callDesktopApi(method, ...args) {
        if (window.pywebview &amp;&amp; window.pywebview.api &amp;&amp; typeof window.pywebview.api[method] === &#x27;function&#x27;) {
          return window.pywebview.api[method](...args);
        }
        if (window.parent === window) return Promise.reject(new Error(&#x27;此功能需要 Windows 桌面版。&#x27;));
        desktopRequestId += 1;
        const id = `cdc-${Date.now()}-${desktopRequestId}`;
        return new Promise((resolve, reject) =&gt; {
          const timer = setTimeout(() =&gt; {
            desktopRequests.delete(id);
            reject(new Error(&#x27;桌面功能响应超时。&#x27;));
          }, 90000);
          desktopRequests.set(id, { resolve, reject, timer });
          window.parent.postMessage({ type: &#x27;cdc-api-call&#x27;, id, method, args }, &#x27;*&#x27;);
        });
      }

      window.addEventListener(&#x27;message&#x27;, (event) =&gt; {
        const message = event.data || {};
        if (message.type === &#x27;cdc-api-ready&#x27;) {
          enableDesktopOcr();
          return;
        }
        if (message.type !== &#x27;cdc-api-result&#x27; || !desktopRequests.has(message.id)) return;
        const pending = desktopRequests.get(message.id);
        clearTimeout(pending.timer);
        desktopRequests.delete(message.id);
        if (message.ok) pending.resolve(message.result);
        else pending.reject(new Error(message.error || &#x27;桌面功能调用失败。&#x27;));
      });

      window.addEventListener(&#x27;pywebviewready&#x27;, enableDesktopOcr);
      if (document.body.dataset.cdcDesktop === &#x27;true&#x27;) enableDesktopOcr();
      if (window.parent !== window) window.parent.postMessage({ type: &#x27;cdc-api-probe&#x27; }, &#x27;*&#x27;);

      function ocrValueKey(candidate) {
        return `${candidate.attribute || &#x27;&#x27;}|${Number(candidate.value).toFixed(4)}`;
      }

      function mergeOcrCandidates() {
        const all = ocrCaptures.flatMap((capture) =&gt; (capture.analysis.fields || []).map((field) =&gt; ({
          ...field,
          source: capture.name
        })));
        const rows = [];
        OCR_ORDER.forEach((fieldName) =&gt; {
          let candidates = all.filter((candidate) =&gt; candidate.field === fieldName &amp;&amp; Number.isFinite(Number(candidate.value)));
          if (!candidates.length) return;
          if (fieldName === &#x27;elemental_bonus&#x27;) {
            const positive = candidates.filter((candidate) =&gt; Number(candidate.value) &gt; 0);
            if (positive.length) candidates = positive;
          }
          const groups = new Map();
          candidates.forEach((candidate) =&gt; {
            const key = ocrValueKey(candidate);
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(candidate);
          });
          const ranked = Array.from(groups.values()).sort((left, right) =&gt; {
            if (right.length !== left.length) return right.length - left.length;
            return Math.max(...right.map((item) =&gt; item.confidence || 0))
              - Math.max(...left.map((item) =&gt; item.confidence || 0));
          });
          const winning = ranked[0];
          const best = winning.slice().sort((a, b) =&gt; (b.confidence || 0) - (a.confidence || 0))[0];
          const confidence = Math.min(0.99, (best.confidence || 0.5) + Math.min(0.06, (winning.length - 1) * 0.03));
          const alternatives = ranked.slice(1).filter((group) =&gt; Number(group[0].value) !== Number(best.value));
          rows.push({
            ...best,
            confidence,
            agreement: winning.length,
            sources: Array.from(new Set(winning.map((item) =&gt; item.source))),
            conflict: alternatives.length &gt; 0,
            alternativeValues: alternatives.map((group) =&gt; group[0].value)
          });
        });
        return rows;
      }

      function renderOcrResults() {
        ocrMergedRows = mergeOcrCandidates();
        const body = byId(&#x27;cdc-ocr-results&#x27;);
        if (!ocrMergedRows.length) {
          body.innerHTML = &#x27;&lt;tr&gt;&lt;td colspan=&quot;6&quot; class=&quot;text-muted&quot;&gt;尚未识别到可填写字段。请确认截图中显示了角色属性面板。&lt;/td&gt;&lt;/tr&gt;&#x27;;
          byId(&#x27;cdc-apply-ocr&#x27;).disabled = true;
          byId(&#x27;cdc-ocr-summary&#x27;).textContent = ocrCaptures.length
            ? `已处理 ${ocrCaptures.length} 张截图，但没有可靠字段。可以继续捕获其他滚动位置。`
            : &#x27;建议至少捕获角色总览、详情上半段和详情下半段。&#x27;;
          return;
        }
        body.innerHTML = ocrMergedRows.map((row, index) =&gt; {
          const target = OCR_TARGETS[row.field];
          const attribute = row.field === &#x27;elemental_bonus&#x27; &amp;&amp; row.attribute ? `${row.attribute} · ` : &#x27;&#x27;;
          const valueText = `${attribute}${Number(row.value).toLocaleString(&#x27;zh-CN&#x27;, { maximumFractionDigits: 4 })}${target.suffix || &#x27;&#x27;}`;
          const conflict = row.conflict ? `；另有识别值 ${row.alternativeValues.join(&#x27;、&#x27;)}` : &#x27;&#x27;;
          const evidence = `${row.agreement} 次一致 · ${row.raw || row.sources.join(&#x27;、&#x27;)}${conflict}`;
          return `&lt;tr&gt;
            &lt;td&gt;&lt;label class=&quot;form-check&quot;&gt;&lt;input class=&quot;form-check-input&quot; type=&quot;checkbox&quot; data-ocr-row=&quot;${index}&quot; checked&gt;&lt;span class=&quot;sr-only&quot;&gt;采用${escapeHtml(target.label)}&lt;/span&gt;&lt;/label&gt;&lt;/td&gt;
            &lt;td&gt;${escapeHtml(row.label || target.label)}&lt;/td&gt;
            &lt;td class=&quot;text-end text-nowrap&quot;&gt;${escapeHtml(valueText)}&lt;/td&gt;
            &lt;td&gt;${escapeHtml(target.label)}&lt;/td&gt;
            &lt;td class=&quot;text-nowrap${row.conflict ? &#x27; text-destructive&#x27; : &#x27;&#x27;}&quot;&gt;${Math.round(row.confidence * 100)}%${row.conflict ? &#x27; · 待核对&#x27; : &#x27;&#x27;}&lt;/td&gt;
            &lt;td class=&quot;text-small&quot;&gt;${escapeHtml(evidence)}&lt;/td&gt;
          &lt;/tr&gt;`;
        }).join(&#x27;&#x27;);
        byId(&#x27;cdc-apply-ocr&#x27;).disabled = false;
        const conflictCount = ocrMergedRows.filter((row) =&gt; row.conflict).length;
        byId(&#x27;cdc-ocr-summary&#x27;).textContent = `已合并 ${ocrCaptures.length} 张截图，得到 ${ocrMergedRows.length} 个可填写字段${conflictCount ? `；${conflictCount} 项存在冲突，请先核对` : &#x27;&#x27;}。`;
      }

      function addOcrCapture(result) {
        if (!result || !result.ok) throw new Error(result &amp;&amp; result.error ? result.error : &#x27;截图识别失败。&#x27;);
        ocrCaptures.push(result);
        if (result.preview) {
          byId(&#x27;cdc-ocr-preview&#x27;).src = result.preview;
          byId(&#x27;cdc-ocr-preview&#x27;).hidden = false;
        }
        renderOcrResults();
        const fieldCount = (result.analysis.fields || []).length;
        byId(&#x27;cdc-ocr-status&#x27;).textContent = `已处理 ${ocrCaptures.length} 张截图；最近一张识别到 ${fieldCount} 条候选字段。截图仅在本机处理。`;
      }

      async function refreshCaptureWindows() {
        const select = byId(&#x27;cdc-ocr-window&#x27;);
        const previous = select.value;
        select.innerHTML = &#x27;&lt;option value=&quot;&quot;&gt;正在读取窗口…&lt;/option&gt;&#x27;;
        try {
          const result = await callDesktopApi(&#x27;get_capture_windows&#x27;);
          if (!result.ok) throw new Error(result.error || &#x27;无法读取窗口列表。&#x27;);
          select.innerHTML = result.windows.length ? result.windows.map((item) =&gt;
            `&lt;option value=&quot;${escapeHtml(item.id)}&quot;&gt;${escapeHtml(item.title)}（${item.width}×${item.height}）&lt;/option&gt;`
          ).join(&#x27;&#x27;) : &#x27;&lt;option value=&quot;&quot;&gt;没有找到可捕获窗口&lt;/option&gt;&#x27;;
          if (previous &amp;&amp; result.windows.some((item) =&gt; item.id === previous)) select.value = previous;
          byId(&#x27;cdc-capture-panel&#x27;).disabled = !select.value;
        } catch (error) {
          select.innerHTML = &#x27;&lt;option value=&quot;&quot;&gt;读取失败&lt;/option&gt;&#x27;;
          byId(&#x27;cdc-capture-panel&#x27;).disabled = true;
          byId(&#x27;cdc-ocr-status&#x27;).textContent = error.message;
        }
      }

      async function captureCurrentPanel() {
        const button = byId(&#x27;cdc-capture-panel&#x27;);
        const windowId = byId(&#x27;cdc-ocr-window&#x27;).value;
        if (!windowId) return;
        const delay = Number(byId(&#x27;cdc-ocr-delay&#x27;).value) || 3;
        button.disabled = true;
        byId(&#x27;cdc-ocr-status&#x27;).textContent = `${delay} 秒后截图：计算器将暂时隐藏，请在游戏中打开或滚动到需要识别的位置。`;
        try {
          addOcrCapture(await callDesktopApi(&#x27;capture_panel&#x27;, windowId, delay));
        } catch (error) {
          byId(&#x27;cdc-ocr-status&#x27;).textContent = error.message;
        } finally {
          button.disabled = false;
        }
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) =&gt; {
          const reader = new FileReader();
          reader.onload = () =&gt; resolve(reader.result);
          reader.onerror = () =&gt; reject(new Error(`无法读取 ${file.name}`));
          reader.readAsDataURL(file);
        });
      }

      async function importOcrFiles(files) {
        const selected = Array.from(files).slice(0, 8);
        for (let index = 0; index &lt; selected.length; index += 1) {
          const file = selected[index];
          byId(&#x27;cdc-ocr-status&#x27;).textContent = `正在识别 ${index + 1}/${selected.length}：${file.name}`;
          try {
            const dataUrl = await readFileAsDataUrl(file);
            addOcrCapture(await callDesktopApi(&#x27;recognize_uploaded_image&#x27;, dataUrl, file.name));
          } catch (error) {
            byId(&#x27;cdc-ocr-status&#x27;).textContent = error.message;
            break;
          }
        }
      }

      function applyOcrResults() {
        const checked = Array.from(byId(&#x27;cdc-ocr-results&#x27;).querySelectorAll(&#x27;[data-ocr-row]:checked&#x27;));
        if (!checked.length) {
          byId(&#x27;cdc-ocr-status&#x27;).textContent = &#x27;请至少勾选一个识别字段。&#x27;;
          return;
        }
        let applied = 0;
        checked.forEach((checkbox) =&gt; {
          const row = ocrMergedRows[Number(checkbox.dataset.ocrRow)];
          const target = row &amp;&amp; OCR_TARGETS[row.field];
          if (!target) return;
          const input = byId(target.input);
          const value = row.field === &#x27;fusion_strength&#x27; ? Math.min(360, Math.max(0, Number(row.value))) : Number(row.value);
          input.value = Number.isInteger(value) ? String(value) : String(Number(value.toFixed(4)));
          applied += 1;
        });
        markDirty();
        scheduleDraftSave();
        byId(&#x27;cdc-ocr-status&#x27;).textContent = `已将 ${applied} 个确认字段填入当前面板。`;
        byId(&#x27;cdc-ocr-dialog&#x27;).close();
      }

      function clearOcrResults() {
        ocrCaptures = [];
        ocrMergedRows = [];
        byId(&#x27;cdc-ocr-preview&#x27;).hidden = true;
        byId(&#x27;cdc-ocr-preview&#x27;).removeAttribute(&#x27;src&#x27;);
        byId(&#x27;cdc-ocr-files&#x27;).value = &#x27;&#x27;;
        byId(&#x27;cdc-ocr-status&#x27;).textContent = &#x27;已清除本次截图识别结果。&#x27;;
        renderOcrResults();
      }

          &lt;label class=&quot;form-label&quot;&gt;攻击加成（%）&lt;input class=&quot;form-control&quot; data-effect-attack type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;${values.attack || 0}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot; data-effect-damage-field&gt;防御穿透（%）&lt;input class=&quot;form-control&quot; data-effect-penetration type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;${values.penetration || 0}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot; data-effect-damage-field&gt;抗性削弱（%）&lt;input class=&quot;form-control&quot; data-effect-res-shred type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;${values.resShred || 0}&quot;&gt;&lt;/label&gt;

          &lt;label class=&quot;form-label&quot; data-effect-damage-field&gt;暴击伤害（%）&lt;input class=&quot;form-control&quot; data-effect-crit type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;${values.crit || 0}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot; data-effect-damage-field&gt;技能倍率（%）&lt;input class=&quot;form-control&quot; data-effect-skill type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;${values.skill || 0}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-check&quot; data-effect-damage-field&gt;&lt;input class=&quot;form-check-input&quot; data-effect-skill-multiply type=&quot;checkbox&quot; ${values.skillMultiply ? &#x27;checked&#x27; : &#x27;&#x27;}&gt;&lt;span class=&quot;form-check-label&quot;&gt;技能倍率乘算&lt;/span&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot; data-effect-fusion-field hidden&gt;环合强度提升（%）&lt;input class=&quot;form-control&quot; data-effect-fusion-percent type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;${values.fusionPercent || 0}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot; data-effect-fusion-field hidden&gt;环合强度固定提升&lt;input class=&quot;form-control&quot; data-effect-fusion-flat type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;${values.fusionFlat || 0}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot; data-effect-heal-field hidden&gt;治疗加成（%）&lt;input class=&quot;form-control&quot; data-effect-heal-bonus type=&quot;number&quot; step=&quot;0.01&quot; value=&quot;${values.healBonus ?? values.heal ?? 0}&quot;&gt;&lt;/label&gt;
          &lt;button class=&quot;btn btn-ghost&quot; type=&quot;button&quot; data-remove-effect&gt;删除此效果&lt;/button&gt;`;
        byId(&#x27;cdc-effects&#x27;).appendChild(row);
        updateCalculatorType();
      }

      function addSkill(name = &#x27;&#x27;, model = &#x27;skill&#x27;, multiplier = 0, observed = 0, critical = false, enabled = true) {
        rowCounter += 1;
        const row = document.createElement(&#x27;div&#x27;);
        row.className = &#x27;entry-row&#x27;;
        row.dataset.skillRow = String(rowCounter);
        row.innerHTML = `
          &lt;label class=&quot;form-label&quot;&gt;技能名称&lt;input class=&quot;form-control&quot; data-skill-name type=&quot;text&quot; value=&quot;${escapeHtml(name)}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot;&gt;伤害模型&lt;select class=&quot;form-select&quot; data-skill-model&gt;&lt;option value=&quot;skill&quot;&gt;常规技能&lt;/option&gt;&lt;option value=&quot;creation&quot;&gt;创生伤害&lt;/option&gt;&lt;/select&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot;&gt;基础倍率（%）&lt;input class=&quot;form-control&quot; data-skill-multiplier type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.01&quot; value=&quot;${multiplier}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot; data-normal-skill-field&gt;实测显示伤害&lt;input class=&quot;form-control&quot; data-skill-observed type=&quot;number&quot; min=&quot;0&quot; step=&quot;1&quot; value=&quot;${observed}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-check&quot; data-normal-skill-field&gt;&lt;input class=&quot;form-check-input&quot; data-skill-critical type=&quot;checkbox&quot; ${critical ? &#x27;checked&#x27; : &#x27;&#x27;}&gt;&lt;span class=&quot;form-check-label&quot;&gt;暴击&lt;/span&gt;&lt;/label&gt;
          &lt;label class=&quot;form-check&quot;&gt;&lt;input class=&quot;form-check-input&quot; data-skill-enabled type=&quot;checkbox&quot; ${enabled ? &#x27;checked&#x27; : &#x27;&#x27;}&gt;&lt;span class=&quot;form-check-label&quot; data-skill-enabled-label&gt;${verificationMode === &#x27;rage&#x27; ? &#x27;作为候选来源&#x27; : &#x27;纳入验算&#x27;}&lt;/span&gt;&lt;/label&gt;
