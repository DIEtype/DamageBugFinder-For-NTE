      function addHeal(name = &#x27;&#x27;, multiplier = 0, observed = 0, enabled = true) {
        rowCounter += 1;
        const row = document.createElement(&#x27;div&#x27;);
        row.className = &#x27;entry-row&#x27;;
        row.dataset.healRow = String(rowCounter);
        row.innerHTML = `
          &lt;label class=&quot;form-label&quot;&gt;治疗技能名称&lt;input class=&quot;form-control&quot; data-heal-name type=&quot;text&quot; value=&quot;${escapeHtml(name)}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot;&gt;治疗倍率（%）&lt;input class=&quot;form-control&quot; data-heal-multiplier type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.01&quot; value=&quot;${multiplier}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-label&quot;&gt;实测显示治疗&lt;input class=&quot;form-control&quot; data-heal-observed type=&quot;number&quot; min=&quot;0&quot; step=&quot;1&quot; value=&quot;${observed}&quot;&gt;&lt;/label&gt;
          &lt;label class=&quot;form-check&quot;&gt;&lt;input class=&quot;form-check-input&quot; data-heal-enabled type=&quot;checkbox&quot; ${enabled ? &#x27;checked&#x27; : &#x27;&#x27;}&gt;&lt;span class=&quot;form-check-label&quot;&gt;纳入验算&lt;/span&gt;&lt;/label&gt;
          &lt;button class=&quot;btn btn-ghost&quot; type=&quot;button&quot; data-remove-heal&gt;删除此治疗技能&lt;/button&gt;`;
        byId(&#x27;cdc-heals&#x27;).appendChild(row);
      }

      function readEffects() {
        return Array.from(root.querySelectorAll(&#x27;[data-effect-row]&#x27;)).map((row, index) =&gt; ({
          name: row.querySelector(&#x27;[data-effect-name]&#x27;).value.trim() || `候选效果${index + 1}`,
          attack: Number(row.querySelector(&#x27;[data-effect-attack]&#x27;).value) / 100 || 0,
          penetration: Number(row.querySelector(&#x27;[data-effect-penetration]&#x27;).value) / 100 || 0,
          resShred: Number(row.querySelector(&#x27;[data-effect-res-shred]&#x27;).value) / 100 || 0,
          damage: Number(row.querySelector(&#x27;[data-effect-damage]&#x27;).value) / 100 || 0,
          crit: Number(row.querySelector(&#x27;[data-effect-crit]&#x27;).value) / 100 || 0,
          skill: Number(row.querySelector(&#x27;[data-effect-skill]&#x27;).value) / 100 || 0,
          skillMultiply: row.querySelector(&#x27;[data-effect-skill-multiply]&#x27;).checked,
          fusionPercent: Number(row.querySelector(&#x27;[data-effect-fusion-percent]&#x27;).value) / 100 || 0,
          fusionFlat: Number(row.querySelector(&#x27;[data-effect-fusion-flat]&#x27;).value) || 0,
          healBonus: Number(row.querySelector(&#x27;[data-effect-heal-bonus]&#x27;).value) / 100 || 0
        }));
      }

      function readSkills() {
        return Array.from(root.querySelectorAll(&#x27;[data-skill-row]&#x27;)).map((row, index) =&gt; ({
          index,
          name: row.querySelector(&#x27;[data-skill-name]&#x27;).value.trim() || `伤害技能${index + 1}`,
          model: row.querySelector(&#x27;[data-skill-model]&#x27;).value,
          multiplier: Number(row.querySelector(&#x27;[data-skill-multiplier]&#x27;).value) / 100 || 0,
          observed: Number(row.querySelector(&#x27;[data-skill-observed]&#x27;).value) || 0,
          critical: row.querySelector(&#x27;[data-skill-critical]&#x27;).checked,
          enabled: row.querySelector(&#x27;[data-skill-enabled]&#x27;).checked
        }));
      }

      function readHeals() {
        return Array.from(root.querySelectorAll(&#x27;[data-heal-row]&#x27;)).map((row, index) =&gt; ({
          index,
          name: row.querySelector(&#x27;[data-heal-name]&#x27;).value.trim() || `治疗技能${index + 1}`,
          multiplier: Number(row.querySelector(&#x27;[data-heal-multiplier]&#x27;).value) / 100 || 0,
          observed: Number(row.querySelector(&#x27;[data-heal-observed]&#x27;).value) || 0,
          enabled: row.querySelector(&#x27;[data-heal-enabled]&#x27;).checked
        }));
      }

      function readRageValues() {
        return byId(&#x27;cdc-rage-values&#x27;).value
          .split(/[^0-9.+-]+/)
          .map((value) =&gt; Number(value))
          .filter((value) =&gt; Number.isFinite(value) &amp;&amp; value &gt;= 0);
      }

      function needsFusionStrength() {
        return calculatorType === &#x27;damage&#x27; &amp;&amp; (byId(&#x27;cdc-infusion-enabled&#x27;).checked
          || Array.from(root.querySelectorAll(&#x27;[data-skill-model]&#x27;)).some((select) =&gt; select.value === &#x27;creation&#x27;));
      }

      function updateCalculatorType() {
        const damageMode = calculatorType === &#x27;damage&#x27;;
        if (!damageMode) verificationMode = &#x27;normal&#x27;;
        root.querySelectorAll(&#x27;[data-calculator-type]&#x27;).forEach((button) =&gt; {
          const active = button.dataset.calculatorType === calculatorType;
          button.classList.toggle(&#x27;btn-primary&#x27;, active);
          button.setAttribute(&#x27;aria-pressed&#x27;, String(active));
        });
        root.querySelectorAll(&#x27;[data-damage-only]&#x27;).forEach((element) =&gt; { element.hidden = !damageMode; });
        root.querySelectorAll(&#x27;[data-heal-only]&#x27;).forEach((element) =&gt; { element.hidden = damageMode; });
        root.querySelectorAll(&#x27;[data-effect-damage-field]&#x27;).forEach((element) =&gt; { element.hidden = !damageMode; });
        root.querySelectorAll(&#x27;[data-effect-heal-field]&#x27;).forEach((element) =&gt; { element.hidden = damageMode; });
        const showFusion = needsFusionStrength();
        root.querySelectorAll(&#x27;[data-fusion-field], [data-effect-fusion-field]&#x27;).forEach((element) =&gt; {
          element.hidden = !showFusion;
        });
        byId(&#x27;cdc-special-field&#x27;).hidden = !damageMode || !byId(&#x27;cdc-special-enabled&#x27;).checked;
        updateVerificationMode();
      }

      function updateVerificationMode() {
        root.querySelectorAll(&#x27;[data-verification-mode]&#x27;).forEach((button) =&gt; {
          const active = button.dataset.verificationMode === verificationMode;
          button.classList.toggle(&#x27;btn-primary&#x27;, active);
          button.setAttribute(&#x27;aria-pressed&#x27;, String(active));
        });
        byId(&#x27;cdc-rage-input&#x27;).hidden = calculatorType !== &#x27;damage&#x27; || verificationMode !== &#x27;rage&#x27;;
        root.querySelectorAll(&#x27;[data-normal-skill-field]&#x27;).forEach((field) =&gt; {
          field.hidden = verificationMode === &#x27;rage&#x27;;
        });
        root.querySelectorAll(&#x27;[data-skill-enabled-label]&#x27;).forEach((label) =&gt; {
          label.textContent = verificationMode === &#x27;rage&#x27; ? &#x27;作为候选来源&#x27; : &#x27;纳入验算&#x27;;
        });
        byId(&#x27;cdc-run-verification&#x27;).textContent = calculatorType === &#x27;heal&#x27;
          ? &#x27;确定并开始治疗验算&#x27;
          : verificationMode === &#x27;rage&#x27; ? &#x27;确定并开始溯源&#x27; : &#x27;确定并开始验算&#x27;;
      }

      function updateSkillPagination(goToLast = false) {
        const rows = Array.from(root.querySelectorAll(&#x27;[data-skill-row]&#x27;));
        const pageCount = Math.max(1, Math.ceil(rows.length / SKILL_PAGE_SIZE));
        if (goToLast) skillPage = pageCount - 1;
        skillPage = Math.max(0, Math.min(skillPage, pageCount - 1));
        rows.forEach((row, index) =&gt; {
          row.hidden = index &lt; skillPage * SKILL_PAGE_SIZE || index &gt;= (skillPage + 1) * SKILL_PAGE_SIZE;
        });
        byId(&#x27;cdc-skill-page&#x27;).textContent = `第 ${skillPage + 1}/${pageCount} 页 · 共 ${rows.length} 项`;
        byId(&#x27;cdc-skill-prev&#x27;).disabled = skillPage === 0;
        byId(&#x27;cdc-skill-next&#x27;).disabled = skillPage &gt;= pageCount - 1;
      }

      function renderDetailPage() {
        const pageCount = Math.max(1, Math.ceil(detailRows.length / DETAIL_PAGE_SIZE));
        detailPage = Math.max(0, Math.min(detailPage, pageCount - 1));
        const start = detailPage * DETAIL_PAGE_SIZE;
        byId(&#x27;cdc-best-details&#x27;).innerHTML = detailRows.slice(start, start + DETAIL_PAGE_SIZE).join(&#x27;&#x27;);
        byId(&#x27;cdc-detail-page&#x27;).textContent = `第 ${detailPage + 1}/${pageCount} 页 · 共 ${detailRows.length} 项`;
        byId(&#x27;cdc-detail-prev&#x27;).disabled = detailPage === 0;
        byId(&#x27;cdc-detail-next&#x27;).disabled = detailPage &gt;= pageCount - 1;
      }

      function captureData() {
        const scalarIds = [&#x27;cdc-character&#x27;, &#x27;cdc-version&#x27;, &#x27;cdc-panel&#x27;, &#x27;cdc-base&#x27;, &#x27;cdc-atk-bonus&#x27;,
          &#x27;cdc-heal-bonus&#x27;, &#x27;cdc-char-level&#x27;, &#x27;cdc-enemy-level&#x27;, &#x27;cdc-resistance&#x27;, &#x27;cdc-fusion&#x27;,
          &#x27;cdc-penetration&#x27;, &#x27;cdc-res-shred&#x27;, &#x27;cdc-general&#x27;, &#x27;cdc-elemental&#x27;, &#x27;cdc-extra&#x27;, &#x27;cdc-crit&#x27;,
          &#x27;cdc-special-multiplier&#x27;, &#x27;cdc-rage-values&#x27;, &#x27;cdc-search-strength&#x27;];
        const scalars = {};
        scalarIds.forEach((id) =&gt; { scalars[id] = byId(id).value; });
        const effects = Array.from(root.querySelectorAll(&#x27;[data-effect-row]&#x27;)).map((row) =&gt; ({
          name: row.querySelector(&#x27;[data-effect-name]&#x27;).value,
          attack: Number(row.querySelector(&#x27;[data-effect-attack]&#x27;).value) || 0,
          penetration: Number(row.querySelector(&#x27;[data-effect-penetration]&#x27;).value) || 0,
          resShred: Number(row.querySelector(&#x27;[data-effect-res-shred]&#x27;).value) || 0,
          damage: Number(row.querySelector(&#x27;[data-effect-damage]&#x27;).value) || 0,
          crit: Number(row.querySelector(&#x27;[data-effect-crit]&#x27;).value) || 0,
          skill: Number(row.querySelector(&#x27;[data-effect-skill]&#x27;).value) || 0,
          skillMultiply: row.querySelector(&#x27;[data-effect-skill-multiply]&#x27;).checked,
          fusionPercent: Number(row.querySelector(&#x27;[data-effect-fusion-percent]&#x27;).value) || 0,
          fusionFlat: Number(row.querySelector(&#x27;[data-effect-fusion-flat]&#x27;).value) || 0,
          healBonus: Number(row.querySelector(&#x27;[data-effect-heal-bonus]&#x27;).value) || 0
        }));
        const skills = Array.from(root.querySelectorAll(&#x27;[data-skill-row]&#x27;)).map((row) =&gt; ({
          name: row.querySelector(&#x27;[data-skill-name]&#x27;).value,
          model: row.querySelector(&#x27;[data-skill-model]&#x27;).value,
          multiplier: Number(row.querySelector(&#x27;[data-skill-multiplier]&#x27;).value) || 0,
          observed: Number(row.querySelector(&#x27;[data-skill-observed]&#x27;).value) || 0,
          critical: row.querySelector(&#x27;[data-skill-critical]&#x27;).checked,
          enabled: row.querySelector(&#x27;[data-skill-enabled]&#x27;).checked
        }));
        const heals = Array.from(root.querySelectorAll(&#x27;[data-heal-row]&#x27;)).map((row) =&gt; ({
          name: row.querySelector(&#x27;[data-heal-name]&#x27;).value,
          multiplier: Number(row.querySelector(&#x27;[data-heal-multiplier]&#x27;).value) || 0,
          observed: Number(row.querySelector(&#x27;[data-heal-observed]&#x27;).value) || 0,
          enabled: row.querySelector(&#x27;[data-heal-enabled]&#x27;).checked
        }));
        return {
          schema: 3,
          calculatorType,
          mode: verificationMode,
          scalars,
          options: {
            infusionEnabled: byId(&#x27;cdc-infusion-enabled&#x27;).checked,
            specialEnabled: byId(&#x27;cdc-special-enabled&#x27;).checked
          },
          effects,
          skills,
          heals
        };
      }

      function applyData(data) {
        if (!data || !data.scalars) return false;
        restoring = true;
        byId(&#x27;cdc-heal-bonus&#x27;).value = &#x27;0&#x27;;
        byId(&#x27;cdc-fusion&#x27;).value = &#x27;360&#x27;;
        byId(&#x27;cdc-special-multiplier&#x27;).value = &#x27;1&#x27;;
        Object.entries(data.scalars).forEach(([id, value]) =&gt; {
          const element = byId(id);
          if (element) element.value = value;
        });
        const storedFusion = Number(byId(&#x27;cdc-fusion&#x27;).value);
        byId(&#x27;cdc-fusion&#x27;).value = String(Number.isFinite(storedFusion)
          ? Math.max(0, Math.min(360, storedFusion))
          : 0);
        byId(&#x27;cdc-infusion-enabled&#x27;).checked = Boolean(data.options?.infusionEnabled);
        byId(&#x27;cdc-special-enabled&#x27;).checked = Boolean(data.options?.specialEnabled);
        byId(&#x27;cdc-effects&#x27;).innerHTML = &#x27;&#x27;;
        byId(&#x27;cdc-skills&#x27;).innerHTML = &#x27;&#x27;;
        byId(&#x27;cdc-heals&#x27;).innerHTML = &#x27;&#x27;;
        (data.effects || []).forEach((effect) =&gt; addEffect(effect.name, effect));
        (data.skills || []).forEach((skill) =&gt; addSkill(skill.name, skill.model, skill.multiplier, skill.observed, skill.critical, skill.enabled));
        (data.heals || []).forEach((heal) =&gt; addHeal(heal.name, heal.multiplier, heal.observed, heal.enabled));
        calculatorType = data.calculatorType === &#x27;heal&#x27; ? &#x27;heal&#x27; : &#x27;damage&#x27;;
        verificationMode = calculatorType === &#x27;damage&#x27; &amp;&amp; data.mode === &#x27;rage&#x27; ? &#x27;rage&#x27; : &#x27;normal&#x27;;
        updateCalculatorType();
        skillPage = 0;
        detailPage = 0;
        updateSkillPagination();
        restoring = false;
        markDirty();
        scheduleDraftSave();
        return true;
      }

      function clearCurrentConfiguration() {
        if (!window.confirm(&#x27;清空当前输入和当前草稿？已保存的角色/版本配置不会删除。&#x27;)) return;
        const scalarIds = [&#x27;cdc-character&#x27;, &#x27;cdc-version&#x27;, &#x27;cdc-panel&#x27;, &#x27;cdc-base&#x27;, &#x27;cdc-atk-bonus&#x27;,
          &#x27;cdc-heal-bonus&#x27;, &#x27;cdc-char-level&#x27;, &#x27;cdc-enemy-level&#x27;, &#x27;cdc-resistance&#x27;, &#x27;cdc-fusion&#x27;,
          &#x27;cdc-penetration&#x27;, &#x27;cdc-res-shred&#x27;, &#x27;cdc-general&#x27;, &#x27;cdc-elemental&#x27;, &#x27;cdc-extra&#x27;, &#x27;cdc-crit&#x27;,
          &#x27;cdc-special-multiplier&#x27;, &#x27;cdc-rage-values&#x27;, &#x27;cdc-search-strength&#x27;];
        const scalars = {};
        scalarIds.forEach((id) =&gt; { scalars[id] = &#x27;&#x27;; });
        scalars[&#x27;cdc-search-strength&#x27;] = &#x27;deep&#x27;;
        scalars[&#x27;cdc-special-multiplier&#x27;] = &#x27;1&#x27;;
        applyData({ schema: 3, calculatorType: &#x27;damage&#x27;, mode: &#x27;normal&#x27;, scalars, options: {}, effects: [], skills: [], heals: [] });
        clearTimeout(draftTimer);
        try {
          localStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify(captureData()));
          byId(&#x27;cdc-profile-status&#x27;).textContent = &#x27;已清空当前配置；已保存档案未变更&#x27;;
        } catch (_error) {
          byId(&#x27;cdc-profile-status&#x27;).textContent = &#x27;当前配置已清空，但本地记忆不可用&#x27;;
        }
        byId(&#x27;cdc-run-status&#x27;).textContent = &#x27;当前配置已清空&#x27;;
      }

      function readStoredProfiles() {
        try { return JSON.parse(localStorage.getItem(PROFILE_STORAGE_KEY) || &#x27;{}&#x27;); }
        catch (_error) { return {}; }
      }

      function writeStoredProfiles(profiles) {
        try { localStorage.setItem(PROFILE_STORAGE_KEY, JSON.stringify(profiles)); return true; }
        catch (_error) { byId(&#x27;cdc-profile-status&#x27;).textContent = &#x27;本地保存不可用&#x27;; return false; }
      }

      function refreshProfileSelect(selectedKey = &#x27;&#x27;) {
        const profiles = readStoredProfiles();
        const keys = Object.keys(profiles).sort((a, b) =&gt; a.localeCompare(b, &#x27;zh-CN&#x27;));
        byId(&#x27;cdc-profile-select&#x27;).innerHTML = keys.length
          ? keys.map((key) =&gt; `&lt;option value=&quot;${escapeHtml(key)}&quot;&gt;${escapeHtml(key)}&lt;/option&gt;`).join(&#x27;&#x27;)
          : &#x27;&lt;option value=&quot;&quot;&gt;暂无已保存配置&lt;/option&gt;&#x27;;
        if (selectedKey &amp;&amp; profiles[selectedKey]) byId(&#x27;cdc-profile-select&#x27;).value = selectedKey;
      }

      function profileKey() {
        const character = byId(&#x27;cdc-character&#x27;).value.trim();
        const version = byId(&#x27;cdc-version&#x27;).value.trim();
        return character &amp;&amp; version ? `${character} · ${version}` : &#x27;&#x27;;
      }

      function scheduleDraftSave() {
        if (restoring) return;
        clearTimeout(draftTimer);
        draftTimer = setTimeout(() =&gt; {
          try {
            localStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify(captureData()));
            byId(&#x27;cdc-profile-status&#x27;).textContent = &#x27;当前草稿已自动记忆&#x27;;
          } catch (_error) {
            byId(&#x27;cdc-profile-status&#x27;).textContent = &#x27;本地记忆不可用&#x27;;
          }
        }, 250);
      }

      const baseAtoms = [
        { id: &#x27;base-attack&#x27;, label: &#x27;基础攻击加成&#x27;, component: &#x27;baseAttack&#x27;, modes: [&#x27;damage&#x27;, &#x27;heal&#x27;] },
        { id: &#x27;base-penetration&#x27;, label: &#x27;基础防御穿透&#x27;, component: &#x27;basePenetration&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;base-res-shred&#x27;, label: &#x27;基础抗性削弱&#x27;, component: &#x27;baseResShred&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;base-general&#x27;, label: &#x27;通用增伤&#x27;, component: &#x27;baseGeneral&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;base-elemental&#x27;, label: &#x27;属性增伤&#x27;, component: &#x27;baseElemental&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;base-extra&#x27;, label: &#x27;额外增伤&#x27;, component: &#x27;baseExtra&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;base-crit&#x27;, label: &#x27;面板暴击伤害&#x27;, component: &#x27;baseCrit&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;zone-defense&#x27;, label: &#x27;防御区整体&#x27;, component: &#x27;zoneDefense&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;zone-resistance&#x27;, label: &#x27;抗性区整体&#x27;, component: &#x27;zoneResistance&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;zone-damage&#x27;, label: &#x27;增伤区整体&#x27;, component: &#x27;zoneDamage&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;zone-crit&#x27;, label: &#x27;暴击区整体&#x27;, component: &#x27;zoneCrit&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;zone-skill&#x27;, label: &#x27;技能倍率区整体&#x27;, component: &#x27;zoneSkill&#x27;, modes: [&#x27;damage&#x27;] },
        { id: &#x27;base-fusion&#x27;, label: &#x27;基础环合强度&#x27;, component: &#x27;baseFusion&#x27;, modes: [&#x27;damage&#x27;], conditional: &#x27;fusion&#x27; },
        { id: &#x27;zone-fusion&#x27;, label: &#x27;环合强度独立乘区&#x27;, component: &#x27;zoneFusion&#x27;, modes: [&#x27;damage&#x27;], conditional: &#x27;fusion&#x27; },
        { id: &#x27;base-special&#x27;, label: &#x27;特殊独立乘区&#x27;, component: &#x27;baseSpecial&#x27;, modes: [&#x27;damage&#x27;], conditional: &#x27;special&#x27; },
        { id: &#x27;base-heal-bonus&#x27;, label: &#x27;基础治疗加成&#x27;, component: &#x27;baseHealBonus&#x27;, modes: [&#x27;heal&#x27;] },
        { id: &#x27;zone-heal-bonus&#x27;, label: &#x27;治疗加成区整体&#x27;, component: &#x27;zoneHealBonus&#x27;, modes: [&#x27;heal&#x27;] }
      ];
      const componentLabels = {
        attack: &#x27;攻击加成&#x27;, penetration: &#x27;防御穿透&#x27;, resShred: &#x27;抗性削弱&#x27;, damage: &#x27;增伤&#x27;,
        crit: &#x27;暴击伤害&#x27;, skill: &#x27;技能倍率&#x27;, fusionPercent: &#x27;环合强度百分比提升&#x27;,
        fusionFlat: &#x27;环合强度固定提升&#x27;, healBonus: &#x27;治疗加成&#x27;
      };

      function createAtoms(effects) {
        const fusionNeeded = needsFusionStrength();
        const atoms = baseAtoms
          .filter((atom) =&gt; atom.modes.includes(calculatorType))
          .filter((atom) =&gt; atom.conditional !== &#x27;fusion&#x27; || fusionNeeded)
          .filter((atom) =&gt; atom.conditional !== &#x27;special&#x27; || byId(&#x27;cdc-special-enabled&#x27;).checked)
          .map((atom) =&gt; ({ ...atom, expected: true, kind: &#x27;base&#x27; }));
        const components = calculatorType === &#x27;heal&#x27;
          ? [&#x27;attack&#x27;, &#x27;healBonus&#x27;]
          : [&#x27;attack&#x27;, &#x27;penetration&#x27;, &#x27;resShred&#x27;, &#x27;damage&#x27;, &#x27;crit&#x27;, &#x27;skill&#x27;]
            .concat(fusionNeeded ? [&#x27;fusionPercent&#x27;, &#x27;fusionFlat&#x27;] : []);
        effects.forEach((effect, effectIndex) =&gt; {
          components.forEach((component) =&gt; {
            if (!effect[component]) return;
            atoms.push({
              id: `effect-${effectIndex}-${component}`,
              kind: &#x27;effect&#x27;,
              expected: true,
              effectIndex,
              effectName: effect.name,
              component,
              value: effect[component],
              skillMultiply: component === &#x27;skill&#x27; &amp;&amp; effect.skillMultiply
            });
          });
        });
        return atoms;
      }

      function buildState(activeIds, atoms) {
        const active = activeIds instanceof Set ? activeIds : new Set(activeIds);
        const enabled = (id) =&gt; active.has(id);
        const state = {
          attackBonus: enabled(&#x27;base-attack&#x27;) ? percent(&#x27;cdc-atk-bonus&#x27;) : 0,
          penetration: enabled(&#x27;base-penetration&#x27;) ? percent(&#x27;cdc-penetration&#x27;) : 0,
          resShred: enabled(&#x27;base-res-shred&#x27;) ? percent(&#x27;cdc-res-shred&#x27;) : 0,
          damageBonus: (enabled(&#x27;base-general&#x27;) ? percent(&#x27;cdc-general&#x27;) : 0)
            + (enabled(&#x27;base-elemental&#x27;) ? percent(&#x27;cdc-elemental&#x27;) : 0)
            + (enabled(&#x27;base-extra&#x27;) ? percent(&#x27;cdc-extra&#x27;) : 0),
          // The game panel shows bonus critical damage. The actual critical
          // multiplier always includes the implicit base multiplier of 1.
          critDamage: 1 + (enabled(&#x27;base-crit&#x27;) ? percent(&#x27;cdc-crit&#x27;) : 0),
          skillAdd: 0,
          skillProduct: 1,
          healBonus: enabled(&#x27;base-heal-bonus&#x27;) ? percent(&#x27;cdc-heal-bonus&#x27;) : 0,
          fusionBase: enabled(&#x27;base-fusion&#x27;) ? number(&#x27;cdc-fusion&#x27;) : 0,
          fusionPercent: 0,
          fusionFlat: 0,
          active,
          baseFailures: atoms.filter((atom) =&gt; atom.kind === &#x27;base&#x27; &amp;&amp; !active.has(atom.id)).map((atom) =&gt; atom.label),
          activeEffectAtoms: atoms.filter((atom) =&gt; atom.kind === &#x27;effect&#x27; &amp;&amp; active.has(atom.id))
        };
        state.activeEffectAtoms.forEach((atom) =&gt; {
          if (atom.component === &#x27;attack&#x27;) state.attackBonus += atom.value;
          if (atom.component === &#x27;penetration&#x27;) state.penetration += atom.value;
          if (atom.component === &#x27;resShred&#x27;) state.resShred += atom.value;
          if (atom.component === &#x27;damage&#x27;) state.damageBonus += atom.value;
          if (atom.component === &#x27;crit&#x27;) state.critDamage += atom.value;
          if (atom.component === &#x27;skill&#x27; &amp;&amp; atom.skillMultiply) state.skillProduct *= 1 + atom.value;
          if (atom.component === &#x27;skill&#x27; &amp;&amp; !atom.skillMultiply) state.skillAdd += atom.value;
          if (atom.component === &#x27;healBonus&#x27;) state.healBonus += atom.value;
          if (atom.component === &#x27;fusionPercent&#x27;) state.fusionPercent += atom.value;
          if (atom.component === &#x27;fusionFlat&#x27;) state.fusionFlat += atom.value;
        });
        state.combatAttack = number(&#x27;cdc-panel&#x27;) + number(&#x27;cdc-base&#x27;) * state.attackBonus;
        state.fusionStrength = state.fusionBase * (1 + state.fusionPercent) + state.fusionFlat;
        const characterFactor = 100 + number(&#x27;cdc-char-level&#x27;);
        const enemyFactor = (100 + number(&#x27;cdc-enemy-level&#x27;)) * (1 - state.penetration);
        const calculatedDefense = characterFactor / (characterFactor + enemyFactor);
        const calculatedResistance = 1 - percent(&#x27;cdc-resistance&#x27;) + state.resShred;
        state.defenseZone = enabled(&#x27;zone-defense&#x27;) ? calculatedDefense : 1;
        state.resistanceZone = enabled(&#x27;zone-resistance&#x27;) ? calculatedResistance : 1;
        state.damageZone = enabled(&#x27;zone-damage&#x27;) ? 1 + state.damageBonus : 1;
        state.critZoneEnabled = enabled(&#x27;zone-crit&#x27;);
        state.skillZoneEnabled = enabled(&#x27;zone-skill&#x27;);
        state.healBonusZone = enabled(&#x27;zone-heal-bonus&#x27;) ? 1 + state.healBonus : 1;
        state.infusionZone = byId(&#x27;cdc-infusion-enabled&#x27;).checked &amp;&amp; enabled(&#x27;zone-fusion&#x27;)
          ? 1.2 * state.fusionStrength / 600
          : 1;
        state.creationFusionZone = enabled(&#x27;zone-fusion&#x27;) ? 1 + state.fusionStrength / 600 : 1;
        state.specialZone = byId(&#x27;cdc-special-enabled&#x27;).checked &amp;&amp; enabled(&#x27;base-special&#x27;)
          ? number(&#x27;cdc-special-multiplier&#x27;)
          : 1;
        return state;
      }

      function describeHypothesis(state, atoms, effects) {
        const effectDescriptions = effects.map((effect, effectIndex) =&gt; {
          const effectAtoms = atoms.filter((atom) =&gt; atom.kind === &#x27;effect&#x27; &amp;&amp; atom.effectIndex === effectIndex);
          if (!effectAtoms.length) return &#x27;&#x27;;
          const activeAtoms = effectAtoms.filter((atom) =&gt; state.active.has(atom.id));
          if (!activeAtoms.length) return `${effect.name}未生效`;
          if (activeAtoms.length === effectAtoms.length) return `${effect.name}全部生效`;
          return `${effect.name}仅${activeAtoms.map((atom) =&gt; componentLabels[atom.component]).join(&#x27;、&#x27;)}生效`;
        }).filter(Boolean);
        const baseDescription = state.baseFailures.length
          ? `基础异常：${state.baseFailures.join(&#x27;、&#x27;)}未生效`
          : &#x27;基础乘区正常&#x27;;
        return effectDescriptions.concat(baseDescription).join(&#x27;；&#x27;);
      }

      function predictSkill(target, source, state) {
        let exact;
        if (target.model === &#x27;creation&#x27;) {
          exact = 9000 * state.defenseZone * state.resistanceZone * state.creationFusionZone;
        } else {
          const calculatedMultiplier = (source.multiplier + state.skillAdd) * state.skillProduct;
          const finalMultiplier = state.skillZoneEnabled ? calculatedMultiplier : 1;
          exact = state.combatAttack * state.defenseZone * state.resistanceZone * state.damageZone
            * finalMultiplier * state.infusionZone * state.specialZone;
        }
        if (target.critical &amp;&amp; state.critZoneEnabled) exact *= state.critDamage;
        return { exact, displayed: Math.round(exact) };
      }

      function evaluateCombination(activeIds, atoms, effects, skills, heals) {
        const state = buildState(activeIds, atoms);
        const damageDetails = [];
        const healDetails = [];
        let normalizedScore = 0;
        let totalDisplayError = 0;
        let wrongMultiplierCount = 0;

        skills.filter((skill) =&gt; skill.enabled).forEach((target) =&gt; {
          if (target.model === &#x27;creation&#x27;) {
            const prediction = predictSkill(target, target, state);
            const error = Math.abs(prediction.displayed - target.observed);
            normalizedScore += error / Math.max(1, target.observed);
            totalDisplayError += error;
            damageDetails.push({ target, source: null, ...prediction, error, wrongSource: false });
            return;
          }
          const sourceCandidates = skills.filter((skill) =&gt; skill.model === &#x27;skill&#x27;).map((source) =&gt; {
            const prediction = predictSkill(target, source, state);
            const error = Math.abs(prediction.displayed - target.observed);
            return { target, source, ...prediction, error, wrongSource: source.index !== target.index };
          });
          sourceCandidates.sort((a, b) =&gt; a.error - b.error || Number(a.wrongSource) - Number(b.wrongSource));
          const bestSource = sourceCandidates[0];
          normalizedScore += bestSource.error / Math.max(1, target.observed);
          totalDisplayError += bestSource.error;
          if (bestSource.wrongSource) wrongMultiplierCount += 1;
          damageDetails.push(bestSource);
        });

        heals.filter((heal) =&gt; heal.enabled).forEach((heal) =&gt; {
          const exact = state.combatAttack * heal.multiplier * state.healBonusZone;
          const displayed = Math.round(exact);
          const error = Math.abs(displayed - heal.observed);
          normalizedScore += error / Math.max(1, heal.observed);
          totalDisplayError += error;
          healDetails.push({ heal, exact, displayed, error });
        });

        const itemErrors = damageDetails.map((detail) =&gt; detail.error).concat(healDetails.map((detail) =&gt; detail.error));
        const maxItemError = itemErrors.length ? Math.max(...itemErrors) : 0;
        const overLimitCount = itemErrors.filter((error) =&gt; error &gt; REPORT_ERROR_LIMIT).length;
        return {
          activeIds: new Set(activeIds), state, damageDetails, healDetails, normalizedScore, totalDisplayError,
          wrongMultiplierCount, baseFailureCount: state.baseFailures.length,
          activeEffectCount: state.activeEffectAtoms.length,
          effectFailureCount: atoms.filter((atom) =&gt; atom.kind === &#x27;effect&#x27;).length - state.activeEffectAtoms.length,
          maxItemError, overLimitCount,
          description: describeHypothesis(state, atoms, effects)
        };
      }

      function evaluateRageCombination(activeIds, atoms, effects, skills, rageValues) {
        const state = buildState(activeIds, atoms);
        const enabledSkills = skills.filter((skill) =&gt; skill.enabled);
        const multiplierSources = enabledSkills.filter((skill) =&gt; skill.model === &#x27;skill&#x27;);
        const sourceCandidates = [];

        enabledSkills.forEach((target) =&gt; {
          const criticalStates = [false, true];
          if (target.model === &#x27;creation&#x27;) {
            criticalStates.forEach((critical) =&gt; {
              const testTarget = { ...target, critical };
              const prediction = predictSkill(testTarget, testTarget, state);
              sourceCandidates.push({ target: testTarget, source: null, wrongSource: false, ...prediction });
            });
            return;
          }
          multiplierSources.forEach((source) =&gt; {
            criticalStates.forEach((critical) =&gt; {
              const testTarget = { ...target, critical };
              const prediction = predictSkill(testTarget, source, state);
              sourceCandidates.push({
                target: testTarget,
                source,
                wrongSource: source.index !== target.index,
                ...prediction
              });
            });
          });
        });

        const damageDetails = rageValues.map((observed, index) =&gt; {
          let best = null;
          let alternatives = 0;
          sourceCandidates.forEach((candidate) =&gt; {
            const tested = { ...candidate, error: Math.abs(candidate.displayed - observed) };
            if (tested.error &lt;= REPORT_ERROR_LIMIT) alternatives += 1;
            if (!best
              || tested.error &lt; best.error
              || (tested.error === best.error &amp;&amp; Number(tested.wrongSource) &lt; Number(best.wrongSource))
              || (tested.error === best.error &amp;&amp; tested.wrongSource === best.wrongSource
                &amp;&amp; Number(tested.target.critical) &lt; Number(best.target.critical))) {
              best = tested;
            }
          });
          if (!best) {
            return { index, observed, matched: false, error: Number.POSITIVE_INFINITY, alternatives: 0 };
          }
          return {
            index,
            observed,
            matched: best.error &lt;= REPORT_ERROR_LIMIT,
            alternatives,
            ...best
          };
        });

        const finiteErrors = damageDetails.map((detail) =&gt; detail.error).filter(Number.isFinite);
        const totalDisplayError = damageDetails.filter((detail) =&gt; detail.matched)
          .reduce((sum, detail) =&gt; sum + detail.error, 0);
        const normalizedScore = damageDetails.reduce((sum, detail) =&gt; {
          if (!Number.isFinite(detail.error)) return sum + 1;
          return sum + detail.error / Math.max(1, detail.observed);
        }, 0);
        const wrongMultiplierCount = damageDetails.filter((detail) =&gt; detail.matched &amp;&amp; detail.wrongSource).length;
        const maxItemError = finiteErrors.length ? Math.max(...finiteErrors) : Number.POSITIVE_INFINITY;
        const overLimitCount = damageDetails.filter((detail) =&gt; !detail.matched).length;

        return {
          activeIds: new Set(activeIds), state, damageDetails, healDetails: [], normalizedScore, totalDisplayError,
          wrongMultiplierCount, baseFailureCount: state.baseFailures.length,
          activeEffectCount: state.activeEffectAtoms.length,
          effectFailureCount: atoms.filter((atom) =&gt; atom.kind === &#x27;effect&#x27;).length - state.activeEffectAtoms.length,
          maxItemError, overLimitCount,
          description: describeHypothesis(state, atoms, effects),
          rageMode: true
        };
      }

      function compareResults(a, b) {
        return a.overLimitCount - b.overLimitCount
          || a.normalizedScore - b.normalizedScore
          || a.baseFailureCount - b.baseFailureCount
          || a.wrongMultiplierCount - b.wrongMultiplierCount
          || a.effectFailureCount - b.effectFailureCount;
      }

      function keepRankedResult(results, result, limit) {
        let low = 0;
        let high = results.length;
        while (low &lt; high) {
          const middle = (low + high) &gt;&gt; 1;
          if (compareResults(result, results[middle]) &lt; 0) high = middle;
          else low = middle + 1;
        }
        if (low &gt;= limit) return;
        results.splice(low, 0, result);
        if (results.length &gt; limit) results.pop();
      }

      function searchHypotheses(atoms, effects, skills, heals, rageValues) {
        const preset = SEARCH_PRESETS[byId(&#x27;cdc-search-strength&#x27;).value] || SEARCH_PRESETS.deep;
        const evaluateState = (activeIds) =&gt; verificationMode === &#x27;rage&#x27;
          ? evaluateRageCombination(activeIds, atoms, effects, skills, rageValues)
          : evaluateCombination(activeIds, atoms, effects, skills, heals);
        const totalLabel = atoms.length &lt;= 52 ? (2 ** atoms.length).toLocaleString(&#x27;zh-CN&#x27;) : `2^${atoms.length}`;
        if (atoms.length &lt;= preset.exactLimit) {
          const results = [];
          const combinations = 2 ** atoms.length;
          for (let mask = 0; mask &lt; combinations; mask += 1) {
            const activeIds = new Set();
            atoms.forEach((atom, index) =&gt; { if ((mask &amp; (1 &lt;&lt; index)) !== 0) activeIds.add(atom.id); });
            keepRankedResult(results, evaluateState(activeIds), EXACT_RESULT_KEEP);
          }
          return { results, tested: combinations, totalLabel, mode: `${preset.label} · 完整枚举` };
        }

        const width = preset.beamWidth;
        const visited = new Set();
        let beam = [new Set(atoms.filter((atom) =&gt; atom.expected).map((atom) =&gt; atom.id))];
        atoms.forEach((atom) =&gt; {
          const candidates = [];
          beam.forEach((previous) =&gt; {
            [false, true].forEach((isActive) =&gt; {
              const activeIds = new Set(previous);
              if (isActive) activeIds.add(atom.id); else activeIds.delete(atom.id);
              visited.add(atoms.map((candidateAtom) =&gt; activeIds.has(candidateAtom.id) ? &#x27;1&#x27; : &#x27;0&#x27;).join(&#x27;&#x27;));
              candidates.push(evaluateState(activeIds));
            });
          });
          candidates.sort(compareResults);
          beam = candidates.slice(0, width).map((result) =&gt; result.activeIds);
        });
        const results = beam.map((activeIds) =&gt; evaluateState(activeIds));
        results.sort(compareResults);
        return { results, tested: visited.size, totalLabel, mode: `${preset.label} · 全生效起点逐项排除 · 限宽 ${width.toLocaleString(&#x27;zh-CN&#x27;)}` };
      }

      function verify() {
        const effects = readEffects();
        const skills = calculatorType === &#x27;damage&#x27; ? readSkills() : [];
        const heals = calculatorType === &#x27;heal&#x27; ? readHeals() : [];
        const rageValues = readRageValues();
        const observationCount = calculatorType === &#x27;damage&#x27; &amp;&amp; verificationMode === &#x27;rage&#x27;
          ? rageValues.length
          : skills.filter((skill) =&gt; skill.enabled).length + heals.filter((heal) =&gt; heal.enabled).length;
        if (!observationCount) {
          byId(&#x27;cdc-best-combination&#x27;).textContent = verificationMode === &#x27;rage&#x27; ? &#x27;没有未知伤害数据&#x27; : &#x27;没有验算项目&#x27;;
          byId(&#x27;cdc-multiplier-status&#x27;).textContent = &#x27;—&#x27;;
          byId(&#x27;cdc-total-error&#x27;).textContent = &#x27;—&#x27;;
          byId(&#x27;cdc-combination-count&#x27;).textContent = &#x27;—&#x27;;
          byId(&#x27;cdc-tie-count&#x27;).textContent = &#x27;—&#x27;;
          detailRows = [];
          renderDetailPage();
          byId(&#x27;cdc-combination-results&#x27;).innerHTML = &#x27;&#x27;;
          byId(&#x27;cdc-verification-note&#x27;).textContent = verificationMode === &#x27;rage&#x27;
            ? &#x27;请输入至少一个未知来源的实测伤害。&#x27;
            : calculatorType === &#x27;heal&#x27; ? &#x27;请至少选择一项治疗数据。&#x27; : &#x27;请至少选择一项伤害数据。&#x27;;
          return;
        }
        if (verificationMode === &#x27;rage&#x27; &amp;&amp; !skills.some((skill) =&gt; skill.enabled)) {
          byId(&#x27;cdc-best-combination&#x27;).textContent = &#x27;没有候选伤害来源&#x27;;
          byId(&#x27;cdc-verification-note&#x27;).textContent = &#x27;请至少启用一个伤害技能或创生伤害模型。&#x27;;
          return;
        }

        const atoms = createAtoms(effects);
        const search = searchHypotheses(atoms, effects, skills, heals, rageValues);
        const results = search.results;
        const eligibleResults = results.filter((result) =&gt; result.overLimitCount === 0);
        if (!eligibleResults.length &amp;&amp; verificationMode !== &#x27;rage&#x27;) {
          byId(&#x27;cdc-best-combination&#x27;).textContent = `没有符合 ±${REPORT_ERROR_LIMIT} 的组合`;
          byId(&#x27;cdc-combination-count&#x27;).textContent = `${search.mode} · 已评估 ${search.tested.toLocaleString(&#x27;zh-CN&#x27;)} / ${search.totalLabel}`;
          byId(&#x27;cdc-multiplier-status&#x27;).textContent = &#x27;—&#x27;;
          byId(&#x27;cdc-total-error&#x27;).textContent = &#x27;—&#x27;;
          byId(&#x27;cdc-tie-count&#x27;).textContent = &#x27;超限结果不汇报&#x27;;
          detailRows = [];
          renderDetailPage();
          byId(&#x27;cdc-combination-results&#x27;).innerHTML = &#x27;&#x27;;
          byId(&#x27;cdc-verification-note&#x27;).textContent = `所有候选状态至少有一项误差超过 ±${REPORT_ERROR_LIMIT}，因此不列出。`;
          return;
        }
        const minimumUnmatched = results[0].overLimitCount;
        const reportableResults = verificationMode === &#x27;rage&#x27;
          ? results.filter((result) =&gt; result.overLimitCount === minimumUnmatched)
          : eligibleResults;
        const best = reportableResults[0];
        const zeroErrorResults = reportableResults.filter((result) =&gt; result.overLimitCount === 0
          &amp;&amp; result.totalDisplayError === 0);
        const top = zeroErrorResults.slice(0, 3);
        const tied = reportableResults.filter((result) =&gt; Math.abs(result.normalizedScore - best.normalizedScore) &lt; 1e-12
          &amp;&amp; result.baseFailureCount === best.baseFailureCount
          &amp;&amp; result.wrongMultiplierCount === best.wrongMultiplierCount
          &amp;&amp; result.effectFailureCount === best.effectFailureCount).length;
        const abnormal = best.damageDetails.filter((detail) =&gt; detail.matched !== false &amp;&amp; detail.wrongSource);

        byId(&#x27;cdc-best-combination&#x27;).textContent = best.description;
        byId(&#x27;cdc-combination-count&#x27;).textContent = `${search.mode} · 已评估 ${search.tested.toLocaleString(&#x27;zh-CN&#x27;)} / ${search.totalLabel}`;
        byId(&#x27;cdc-multiplier-status&#x27;).textContent = abnormal.length ? `${abnormal.length} 项疑似误用` : &#x27;未发现&#x27;;
        byId(&#x27;cdc-total-error&#x27;).textContent = best.totalDisplayError.toLocaleString(&#x27;zh-CN&#x27;);
        byId(&#x27;cdc-tie-count&#x27;).textContent = verificationMode === &#x27;rage&#x27;
          ? `无来源 ${best.overLimitCount} 项 · 同优先级状态 ${tied} 个`
          : `同优先级状态 ${tied} 个`;
        byId(&#x27;cdc-verification-note&#x27;).textContent = verificationMode === &#x27;rage&#x27;
          ? (top.length
            ? `已为 ${best.damageDetails.length - best.overLimitCount}/${best.damageDetails.length} 个伤害找到 ±${REPORT_ERROR_LIMIT} 内来源；右栏只显示整批零误差且无缺失来源的全局状态。`
            : `最佳状态仍有误差或无来源；无零误差备选，右栏不显示近似状态。`)
          : (top.length
            ? &#x27;右栏只显示整批显示值总误差为 0 的全局状态，并按解释优先级排序。&#x27;
            : `最佳状态的显示值总误差为 ${best.totalDisplayError.toLocaleString(&#x27;zh-CN&#x27;)}；无零误差备选，右栏不显示近似状态。`);

        const damageRows = best.damageDetails.map((detail) =&gt; {
          if (verificationMode === &#x27;rage&#x27;) {
            if (!detail.matched) {
              return `&lt;div class=&quot;entry-row&quot;&gt;
                &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;实测项目&lt;/div&gt;&lt;div&gt;未知伤害 ${detail.index + 1}&lt;/div&gt;&lt;/div&gt;
                &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;可能来源&lt;/div&gt;&lt;div&gt;±${REPORT_ERROR_LIMIT} 内无来源&lt;/div&gt;&lt;/div&gt;
                &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;理论值&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;不汇报超限匹配&lt;/div&gt;&lt;/div&gt;
                &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;实测值&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${detail.observed.toLocaleString(&#x27;zh-CN&#x27;)}&lt;/div&gt;&lt;/div&gt;
                &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;±20 内来源数&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;0&lt;/div&gt;&lt;/div&gt;
              &lt;/div&gt;`;
            }
            const modelName = detail.target.model === &#x27;creation&#x27; ? &#x27;创生伤害&#x27; : detail.target.name;
            const critName = detail.target.critical ? &#x27;暴击&#x27; : &#x27;非暴击&#x27;;
            const multiplierName = detail.target.model === &#x27;creation&#x27;
              ? &#x27;固定基础值 9000 × 环合强度修正&#x27;
              : detail.wrongSource ? `倍率疑似来自：${detail.source.name}` : &#x27;本技能倍率&#x27;;
            return `&lt;div class=&quot;entry-row&quot;&gt;
              &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;实测项目&lt;/div&gt;&lt;div&gt;未知伤害 ${detail.index + 1} · ${detail.observed.toLocaleString(&#x27;zh-CN&#x27;)}&lt;/div&gt;&lt;/div&gt;
              &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;可能来源&lt;/div&gt;&lt;div&gt;${escapeHtml(modelName)} · ${critName}&lt;/div&gt;&lt;/div&gt;
              &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;倍率来源&lt;/div&gt;&lt;div&gt;${escapeHtml(multiplierName)}&lt;/div&gt;&lt;/div&gt;
              &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;理论值 → 显示值&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${format(detail.exact)} → ${detail.displayed.toLocaleString(&#x27;zh-CN&#x27;)}&lt;/div&gt;&lt;/div&gt;
              &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;误差 / ±20 内来源数&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${detail.error} / ${detail.alternatives}&lt;/div&gt;&lt;/div&gt;
            &lt;/div&gt;`;
          }
          const source = detail.target.model === &#x27;creation&#x27;
            ? &#x27;固定基础值 9000 × 环合强度修正&#x27;
            : detail.wrongSource ? `疑似误用：${detail.source.name}` : &#x27;本技能倍率&#x27;;
          return `&lt;div class=&quot;entry-row&quot;&gt;
            &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;实测项目&lt;/div&gt;&lt;div&gt;${escapeHtml(detail.target.name)}&lt;/div&gt;&lt;/div&gt;
            &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;倍率来源&lt;/div&gt;&lt;div&gt;${escapeHtml(source)}&lt;/div&gt;&lt;/div&gt;
            &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;理论精确值 → 显示值&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${format(detail.exact)} → ${detail.displayed.toLocaleString(&#x27;zh-CN&#x27;)}&lt;/div&gt;&lt;/div&gt;
            &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;实测值&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${detail.target.observed.toLocaleString(&#x27;zh-CN&#x27;)}&lt;/div&gt;&lt;/div&gt;
            &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;误差&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${detail.error.toLocaleString(&#x27;zh-CN&#x27;)}&lt;/div&gt;&lt;/div&gt;
          &lt;/div&gt;`;
        });
        const healRows = verificationMode === &#x27;rage&#x27; ? [] : best.healDetails.map((detail) =&gt; `&lt;div class=&quot;entry-row&quot;&gt;
          &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;实测项目&lt;/div&gt;&lt;div&gt;${escapeHtml(detail.heal.name)}&lt;/div&gt;&lt;/div&gt;
          &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;倍率来源&lt;/div&gt;&lt;div&gt;本治疗倍率&lt;/div&gt;&lt;/div&gt;
          &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;理论精确值 → 显示值&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${format(detail.exact)} → ${detail.displayed.toLocaleString(&#x27;zh-CN&#x27;)}&lt;/div&gt;&lt;/div&gt;
          &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;实测值&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${detail.heal.observed.toLocaleString(&#x27;zh-CN&#x27;)}&lt;/div&gt;&lt;/div&gt;
          &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;误差&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${detail.error.toLocaleString(&#x27;zh-CN&#x27;)}&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;`);
        detailRows = damageRows.concat(healRows);
        renderDetailPage();

        byId(&#x27;cdc-combination-results&#x27;).innerHTML = top.length ? top.map((result) =&gt; `&lt;div class=&quot;entry-row&quot;&gt;
          &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;效果与失效状态&lt;/div&gt;&lt;div&gt;${escapeHtml(result.description)}&lt;/div&gt;&lt;/div&gt;
          &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;显示值总误差&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${result.totalDisplayError.toLocaleString(&#x27;zh-CN&#x27;)}&lt;/div&gt;&lt;/div&gt;
          &lt;div&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;无来源 / 倍率误用 / 基础失效 / 效果失效&lt;/div&gt;&lt;div class=&quot;detail-value&quot;&gt;${result.overLimitCount} / ${result.wrongMultiplierCount} / ${result.baseFailureCount} / ${result.effectFailureCount}&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;`).join(&#x27;&#x27;) : &#x27;&lt;div class=&quot;text-small result-meta&quot;&gt;无零误差全局状态&lt;/div&gt;&#x27;;
      }

      function markDirty() {
        if (restoring) return;
        byId(&#x27;cdc-run-status&#x27;).textContent = calculatorType === &#x27;heal&#x27;
          ? &#x27;数据已修改，点击“确定并开始治疗验算”&#x27;
          : verificationMode === &#x27;rage&#x27; ? &#x27;数据已修改，点击“确定并开始溯源”&#x27; : &#x27;数据已修改，点击“确定并开始验算”&#x27;;
        if (verificationDirty) return;
        verificationDirty = true;
        byId(&#x27;cdc-best-combination&#x27;).textContent = &#x27;等待验算&#x27;;
        byId(&#x27;cdc-combination-count&#x27;).textContent = &#x27;当前结果尚未计算&#x27;;
        byId(&#x27;cdc-multiplier-status&#x27;).textContent = &#x27;—&#x27;;
        byId(&#x27;cdc-total-error&#x27;).textContent = &#x27;—&#x27;;
        byId(&#x27;cdc-tie-count&#x27;).textContent = &#x27;—&#x27;;
        detailRows = [];
        detailPage = 0;
        renderDetailPage();
        byId(&#x27;cdc-combination-results&#x27;).innerHTML = &#x27;&#x27;;
        byId(&#x27;cdc-verification-note&#x27;).textContent = &#x27;完成全部输入后再启动验算。&#x27;;
      }

      function runVerification() {
        const button = byId(&#x27;cdc-run-verification&#x27;);
        button.disabled = true;
        byId(&#x27;cdc-run-status&#x27;).textContent = &#x27;正在计算组合，请稍候…&#x27;;
        setTimeout(() =&gt; {
          try {
            verify();
            verificationDirty = false;
            byId(&#x27;cdc-run-status&#x27;).textContent = calculatorType === &#x27;heal&#x27;
              ? &#x27;治疗验算完成&#x27;
              : verificationMode === &#x27;rage&#x27; ? &#x27;溯源完成&#x27; : &#x27;验算完成&#x27;;
          } catch (_error) {
            verificationDirty = true;
            byId(&#x27;cdc-run-status&#x27;).textContent = verificationMode === &#x27;rage&#x27; ? &#x27;溯源过程中出现错误&#x27; : &#x27;验算过程中出现错误&#x27;;
          } finally {
            button.disabled = false;
          }
        }, 20);
      }

      root.addEventListener(&#x27;input&#x27;, (event) =&gt; {
        if (event.target.matches(&#x27;input, select, textarea&#x27;)) {
          if (event.target.id !== &#x27;cdc-profile-select&#x27;) markDirty();
          scheduleDraftSave();
        }
      });
      root.addEventListener(&#x27;change&#x27;, (event) =&gt; {
        if (event.target.matches(&#x27;input, select, textarea&#x27;)) {
          if (event.target.matches(&#x27;[data-skill-model], #cdc-infusion-enabled, #cdc-special-enabled&#x27;)) {
            updateCalculatorType();
          }
          if (event.target.id !== &#x27;cdc-profile-select&#x27;) markDirty();
          scheduleDraftSave();
        }
      });
      root.addEventListener(&#x27;click&#x27;, (event) =&gt; {
        const removeEffect = event.target.closest(&#x27;[data-remove-effect]&#x27;);
        const removeSkill = event.target.closest(&#x27;[data-remove-skill]&#x27;);
        const removeHeal = event.target.closest(&#x27;[data-remove-heal]&#x27;);
        if (removeEffect) removeEffect.closest(&#x27;[data-effect-row]&#x27;).remove();
        if (removeSkill) removeSkill.closest(&#x27;[data-skill-row]&#x27;).remove();
        if (removeHeal) removeHeal.closest(&#x27;[data-heal-row]&#x27;).remove();
        if (removeEffect || removeSkill || removeHeal) {
          updateSkillPagination();
          markDirty();
          scheduleDraftSave();
        }
      });
      byId(&#x27;cdc-add-effect&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { addEffect(); markDirty(); scheduleDraftSave(); });
      byId(&#x27;cdc-add-skill&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        addSkill();
        updateSkillPagination(true);
        markDirty();
        scheduleDraftSave();
      });
      byId(&#x27;cdc-add-heal&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { addHeal(); markDirty(); scheduleDraftSave(); });
      byId(&#x27;cdc-skill-prev&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { skillPage -= 1; updateSkillPagination(); });
      byId(&#x27;cdc-skill-next&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { skillPage += 1; updateSkillPagination(); });
      byId(&#x27;cdc-detail-prev&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { detailPage -= 1; renderDetailPage(); });
      byId(&#x27;cdc-detail-next&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { detailPage += 1; renderDetailPage(); });
      byId(&#x27;cdc-run-verification&#x27;).addEventListener(&#x27;click&#x27;, runVerification);
      root.querySelectorAll(&#x27;[data-calculator-type]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          calculatorType = button.dataset.calculatorType;
          updateCalculatorType();
          markDirty();
          scheduleDraftSave();
        });
      });
      root.querySelectorAll(&#x27;[data-verification-mode]&#x27;).forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; {
          verificationMode = button.dataset.verificationMode;
          updateVerificationMode();
          markDirty();
          scheduleDraftSave();
        });
      });

      byId(&#x27;cdc-save-profile&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const key = profileKey();
        if (!key) {
          byId(&#x27;cdc-profile-status&#x27;).textContent = &#x27;请填写角色名称和版本&#x27;;
          return;
        }
        const profiles = readStoredProfiles();
        profiles[key] = captureData();
        if (writeStoredProfiles(profiles)) {
          refreshProfileSelect(key);
          byId(&#x27;cdc-profile-status&#x27;).textContent = `已保存：${key}`;
        }
      });
      byId(&#x27;cdc-load-profile&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const key = byId(&#x27;cdc-profile-select&#x27;).value;
        const profiles = readStoredProfiles();
        if (key &amp;&amp; profiles[key] &amp;&amp; applyData(profiles[key])) {
          byId(&#x27;cdc-profile-status&#x27;).textContent = `已载入：${key}`;
        }
      });
      byId(&#x27;cdc-delete-profile&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const key = byId(&#x27;cdc-profile-select&#x27;).value;
        const profiles = readStoredProfiles();
        if (!key || !profiles[key]) return;
        if (!window.confirm(`删除配置“${key}”？`)) return;
        delete profiles[key];
        if (writeStoredProfiles(profiles)) {
          refreshProfileSelect();
          byId(&#x27;cdc-profile-status&#x27;).textContent = `已删除：${key}`;
        }
      });
      byId(&#x27;cdc-clear-current&#x27;).addEventListener(&#x27;click&#x27;, clearCurrentConfiguration);
      byId(&#x27;cdc-open-ocr&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        byId(&#x27;cdc-ocr-dialog&#x27;).showModal();
        refreshCaptureWindows();
      });
      byId(&#x27;cdc-close-ocr&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; byId(&#x27;cdc-ocr-dialog&#x27;).close());
      byId(&#x27;cdc-refresh-windows&#x27;).addEventListener(&#x27;click&#x27;, refreshCaptureWindows);
      byId(&#x27;cdc-capture-panel&#x27;).addEventListener(&#x27;click&#x27;, captureCurrentPanel);
      byId(&#x27;cdc-clear-ocr&#x27;).addEventListener(&#x27;click&#x27;, clearOcrResults);
      byId(&#x27;cdc-apply-ocr&#x27;).addEventListener(&#x27;click&#x27;, applyOcrResults);
      byId(&#x27;cdc-ocr-files&#x27;).addEventListener(&#x27;change&#x27;, (event) =&gt; importOcrFiles(event.target.files));

      refreshProfileSelect();
      updateCalculatorType();
      let restoredDraft = false;
      try {
        const draft = JSON.parse(localStorage.getItem(DRAFT_STORAGE_KEY) || &#x27;null&#x27;);
        if (draft) restoredDraft = applyData(draft);
      } catch (_error) {
        restoredDraft = false;
      }
      if (!restoredDraft) {
        addEffect(&#x27;觉醒A&#x27;, { damage: 20 });
        addEffect(&#x27;武器B&#x27;, { attack: 20 });
        addSkill(&#x27;技能一&#x27;, &#x27;skill&#x27;, 240, 4413, false);
        addSkill(&#x27;技能二&#x27;, &#x27;skill&#x27;, 315, 5793, false);
        addHeal(&#x27;治疗一&#x27;, 120, 2520);
        updateSkillPagination();
        updateCalculatorType();
        markDirty();
        scheduleDraftSave();
      }
    })();
  &lt;/script&gt;

"></iframe>
<script data-cdc-desktop-bridge>
(() => {
  const frame = document.querySelector('iframe');
  const allowed = new Set(['get_capture_windows', 'capture_panel', 'recognize_uploaded_image']);
  let ready = Boolean(window.pywebview && window.pywebview.api);

  function notifyReady() {
    if (frame && frame.contentWindow) frame.contentWindow.postMessage({ type: 'cdc-api-ready' }, '*');
  }

  window.addEventListener('pywebviewready', () => {
    ready = true;
    notifyReady();
  });

  window.addEventListener('message', async (event) => {
    if (!frame || event.source !== frame.contentWindow) return;
    const message = event.data || {};
    if (message.type === 'cdc-api-probe') {
      if (ready || (window.pywebview && window.pywebview.api)) {
        ready = true;
        notifyReady();
      }
      return;
    }
    if (message.type !== 'cdc-api-call' || !message.id) return;
    if (!allowed.has(message.method)) {
      frame.contentWindow.postMessage({ type: 'cdc-api-result', id: message.id, ok: false, error: '不允许的桌面功能。' }, '*');
      return;
    }
    try {
      if (!window.pywebview || !window.pywebview.api) throw new Error('桌面功能尚未就绪。');
      const result = await window.pywebview.api[message.method](...(message.args || []));
      frame.contentWindow.postMessage({ type: 'cdc-api-result', id: message.id, ok: true, result }, '*');
    } catch (error) {
      frame.contentWindow.postMessage({
        type: 'cdc-api-result', id: message.id, ok: false,
        error: error && error.message ? error.message : String(error)
      }, '*');
    }
  });

  if (ready) notifyReady();
})();
</script>
